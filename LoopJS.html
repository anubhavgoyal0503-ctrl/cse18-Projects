<body>
    <script>
        //loops: used to perform repeatedly run a block of code untill a specific condition is met.
        
        //for loop: used when you know the number of iteractions in  advance
        let studentlist=["Anuj","Aryan","Gopal","Apporv"];

        for (let i=0; i<studentlist.length; i++) {
            console.log("student Name:" + i);

        }
        
        let studentslist = ["Anuj","Aryan","Gopal","Apporv"];

        let i = 0;

        while (i < studentlist.length) {
        console.log("Student Name: " + studentlist[i]);
           i++;
       }
    </script>
